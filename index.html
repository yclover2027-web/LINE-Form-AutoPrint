<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>処方せん送信フォーム</title>
    <!-- お化粧ファイル（CSS）の読み込み -->
    <link rel="stylesheet" href="style.css">
    <!-- LIFFのSDK（ライン公式のプログラム部品）を読み込みます -->
    <!-- SDKとは「Software Development Kit」の略で、LINEが用意してくれた便利な道具箱のことです -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <!-- 画面全体を包む「柔らかいカード（白い箱）」 -->
    <div class="container">
        
        <!-- ヘッダー部分：マスコットとタイトルを横に並べる場所 -->
        <div class="header-section">
            <!-- 追加していただいたマスコット画像を表示します -->
            <img src="マスコット　指さし２.png" alt="ご案内マスコット" class="mascot-img">
            <h1 class="form-title">処方せん<br>送信フォーム</h1>
        </div>

        <!-- LINEのお名前を表示するウェルカムメッセージ（最初は隠してあります） -->
        <div id="welcomeMessage" style="display:none; text-align:center; padding:6px 0 2px; font-size:0.95rem; color:#027d45; font-weight:bold;">
            👤 <span id="userName"></span>様、ようこそ！
        </div>
        <!-- LINEアプリ以外（パソコンブラウザ等）から開かれた場合の注意書き -->
        <div id="notLiffMessage" style="display:none; text-align:center; padding:6px; font-size:0.85rem; color:#999;">
            ※LINEアプリからこのフォームを開いてください。
        </div>
        
        <!-- 患者さんへの説明文（ここから） -->
        <div class="info-card">
            <p class="description bold">こちらからお手持ちの処方せんを撮影して、お送りください。</p>
            <p class="attention">
                ※処方せん全体がハッキリ写るように撮影をお願いします。
            </p>
        </div>
        <!-- 患者さんへの説明文（ここまで） -->

        <!-- 良い写真・悪い写真の例 -->
        <div class="example-images">
            <div class="example good">
                <!-- 「OKの例」というバッジ（シール）をつけます -->
                <span class="badge good-badge">OKの例</span>
                <!-- ここに shohousen.jpg を表示し、赤〇を重ねます -->
                <div class="example-img-wrapper">
                    <img src="shohousen.jpg" alt="良い例">
                    <div class="mark-circle"></div>
                </div>
            </div>
            <div class="example bad">
                <!-- 「NGの例」というバッジをつけます -->
                <span class="badge bad-badge">NGの例</span>
                <!-- お薬の部分だけをズームして表示し、赤×を重ねます -->
                <div class="example-img-wrapper cropped">
                    <img src="shohousen.jpg" alt="悪い例" class="zoom-medicine">
                    <div class="mark-cross"></div>
                </div>
            </div>
        </div>

        <!-- 写真を選んで送信するための入力フォーム -->
        <form id="uploadForm">
            
            <!-- 1枚目の写真を選ぶ場所（必須） -->
            <div class="upload-section">
                <label>処方せん画像 1 <span class="required">（必須）</span></label>
                <!-- 見えない本物のボタン（アルバムから選ぶ用） -->
                <input type="file" id="file1" accept="image/*" class="hidden-input">
                
                <!-- Android用ボタン（アルバムとカメラの２つ） -->
                <div class="btn-group" id="android-btns-1">
                    <!-- アルバムから選ぶボタン -->
                    <button type="button" class="upload-btn" onclick="document.getElementById('file1').click()">
                        <span class="icon">🖼️</span> アルバムから選ぶ
                    </button>
                    <!-- カメラで撮影ボタン -->
                    <button type="button" class="camera-btn" onclick="openCamera(1)">
                        <span class="icon">📷</span> カメラで撮影
                    </button>
                </div>

                <!-- iPhone(iOS)用ボタン（写真を選ぶ１つだけ） -->
                <div class="btn-group" id="ios-btns-1" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file1').click()" style="width: 100%;">
                        <span class="icon">📷</span> 写真を選ぶ
                    </button>
                </div>

                <!-- 選んだ写真の名前が出る場所（最初は空っぽ） -->
                <p id="fileName1" class="file-name"></p>

                <!-- Android用 プレビュー画面（最初は隠しておく） -->
                <div id="previewArea1" class="preview-area" style="display: none;">
                    <p class="preview-title">選んだ写真の確認</p>
                    <img id="previewImg1" class="preview-image" src="" alt="プレビュー">
                    <br>
                    <button type="button" class="redo-btn" onclick="resetSlot(1)">
                        <span class="icon">❌</span> 選び直す
                    </button>
                </div>
            </div>

            <!-- 2枚目の写真を選ぶ場所 -->
            <div class="upload-section">
                <label>処方せん画像 2</label>
                <input type="file" id="file2" accept="image/*" class="hidden-input">
                
                <!-- Android用ボタン -->
                <div class="btn-group" id="android-btns-2">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file2').click()">
                        <span class="icon">🖼️</span> アルバムから選ぶ
                    </button>
                    <button type="button" class="camera-btn" onclick="openCamera(2)">
                        <span class="icon">📷</span> カメラで撮影
                    </button>
                </div>

                <!-- iPhone(iOS)用ボタン -->
                <div class="btn-group" id="ios-btns-2" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file2').click()" style="width: 100%;">
                        <span class="icon">📷</span> 写真を選ぶ
                    </button>
                </div>

                <p id="fileName2" class="file-name"></p>

                <!-- Android用 プレビュー画面 -->
                <div id="previewArea2" class="preview-area" style="display: none;">
                    <p class="preview-title">選んだ写真の確認</p>
                    <img id="previewImg2" class="preview-image" src="" alt="プレビュー">
                    <br>
                    <button type="button" class="redo-btn" onclick="resetSlot(2)">
                        <span class="icon">❌</span> 選び直す
                    </button>
                </div>
            </div>

            <!-- 3枚目の写真を選ぶ場所 -->
            <div class="upload-section">
                <label>処方せん画像 3</label>
                <input type="file" id="file3" accept="image/*" class="hidden-input">
                
                <!-- Android用ボタン -->
                <div class="btn-group" id="android-btns-3">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file3').click()">
                        <span class="icon">🖼️</span> アルバムから選ぶ
                    </button>
                    <button type="button" class="camera-btn" onclick="openCamera(3)">
                        <span class="icon">📷</span> カメラで撮影
                    </button>
                </div>

                <!-- iPhone(iOS)用ボタン -->
                <div class="btn-group" id="ios-btns-3" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file3').click()" style="width: 100%;">
                        <span class="icon">📷</span> 写真を選ぶ
                    </button>
                </div>

                <p id="fileName3" class="file-name"></p>

                <!-- Android用 プレビュー画面 -->
                <div id="previewArea3" class="preview-area" style="display: none;">
                    <p class="preview-title">選んだ写真の確認</p>
                    <img id="previewImg3" class="preview-image" src="" alt="プレビュー">
                    <br>
                    <button type="button" class="redo-btn" onclick="resetSlot(3)">
                        <span class="icon">❌</span> 選び直す
                    </button>
                </div>
            </div>

            <!-- 4枚目の写真を選ぶ場所 -->
            <div class="upload-section">
                <label>処方せん画像 4</label>
                <input type="file" id="file4" accept="image/*" class="hidden-input">
                
                <!-- Android用ボタン -->
                <div class="btn-group" id="android-btns-4">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file4').click()">
                        <span class="icon">🖼️</span> アルバムから選ぶ
                    </button>
                    <button type="button" class="camera-btn" onclick="openCamera(4)">
                        <span class="icon">📷</span> カメラで撮影
                    </button>
                </div>

                <!-- iPhone(iOS)用ボタン -->
                <div class="btn-group" id="ios-btns-4" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file4').click()" style="width: 100%;">
                        <span class="icon">📷</span> 写真を選ぶ
                    </button>
                </div>

                <p id="fileName4" class="file-name"></p>

                <!-- Android用 プレビュー画面 -->
                <div id="previewArea4" class="preview-area" style="display: none;">
                    <p class="preview-title">選んだ写真の確認</p>
                    <img id="previewImg4" class="preview-image" src="" alt="プレビュー">
                    <br>
                    <button type="button" class="redo-btn" onclick="resetSlot(4)">
                        <span class="icon">❌</span> 選び直す
                    </button>
                </div>
            </div>

            <!-- 5枚目の写真を選ぶ場所 -->
            <div class="upload-section">
                <label>処方せん画像 5</label>
                <input type="file" id="file5" accept="image/*" class="hidden-input">
                
                <!-- Android用ボタン -->
                <div class="btn-group" id="android-btns-5">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file5').click()">
                        <span class="icon">🖼️</span> アルバムから選ぶ
                    </button>
                    <button type="button" class="camera-btn" onclick="openCamera(5)">
                        <span class="icon">📷</span> カメラで撮影
                    </button>
                </div>

                <!-- iPhone(iOS)用ボタン -->
                <div class="btn-group" id="ios-btns-5" style="display: none;">
                    <button type="button" class="upload-btn" onclick="document.getElementById('file5').click()" style="width: 100%;">
                        <span class="icon">📷</span> 写真を選ぶ
                    </button>
                </div>

                <p id="fileName5" class="file-name"></p>

                <!-- Android用 プレビュー画面 -->
                <div id="previewArea5" class="preview-area" style="display: none;">
                    <p class="preview-title">選んだ写真の確認</p>
                    <img id="previewImg5" class="preview-image" src="" alt="プレビュー">
                    <br>
                    <button type="button" class="redo-btn" onclick="resetSlot(5)">
                        <span class="icon">❌</span> 選び直す
                    </button>
                </div>
            </div>

            <!-- 送信ボタン -->
            <button type="submit" class="submit-btn" id="submitBtn">送信する</button>

            <!-- 送信中のお知らせ（最初は隠してあります） -->
            <div id="loadingMessage" class="loading-message" style="display: none;">
                <p class="spinner">↻</p>
                <p>安全に送信しています...<br>（このままお待ちください）</p>
            </div>
        </form>
    </div>

    <!-- ============================================================ -->
    <!-- カメラオーバーレイ（普段は見えず、カメラボタンを押すと全画面で表示） -->
    <!-- ============================================================ -->
    <div id="cameraOverlay" class="camera-overlay" style="display:none;">
        <!-- カメラ映像が映る場所 -->
        <video id="cameraVideo" autoplay playsinline></video>
        <!-- 撮影用のキャンバス（裏方で使います、画面には見えません） -->
        <canvas id="cameraCanvas" style="display:none;"></canvas>
        <!-- カメラ操作ボタン -->
        <div class="camera-controls">
            <button type="button" class="camera-close-btn" onclick="closeCamera()">✕ 閉じる</button>
            <button type="button" class="camera-shutter-btn" onclick="takePhoto()">📷 撮影</button>
        </div>
    </div>

    <!-- 動きを入れるJavaScriptの読み込み -->
    <script src="script.js"></script>
</body>
</html>
